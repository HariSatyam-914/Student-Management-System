<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full mx-4 p-8 bg-white rounded-xl shadow-lg border border-gray-100">
        
        <div class="mb-4 text-left">
            <a href="index.html" class="text-xs font-semibold text-gray-500 hover:text-indigo-600 transition-colors inline-flex items-center space-x-1">
                <span>← Back to Home</span>
            </a>
        </div>
        
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Student Registration</h1>
        
        <form action="addstudent" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Enter Student Name</label>
                <input type="text" name="sname" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Enter Email Id</label>
                <input type="email" name="email" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
                
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Enter Course Name</label>
                <input type="text" name="course" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
                
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Enter Phone No</label>
                <input type="text" name="mobile" required 
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div class="pt-2">
                <button type="submit" 
                        class="w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-indigo-700 shadow-md transition-all">
                    Register Student
                </button>
            </div>
        </form>
        
        <div class="mt-6 flex justify-between items-center border-t border-gray-100 pt-4 text-sm font-medium">
            <a href="index.html" class="text-gray-500 hover:text-gray-800 underline">
                <button
                	class="inline-block bg-indigo-600 text-white px-3 py-1.5 rounded"
                >Go to Home</button>
            </a>
            <a href="readstudentdata" class="text-indigo-600 hover:text-indigo-800 underline">
                <button
                	class="inline-block bg-orange-600 text-white px-3 py-1.5 rounded"
                >View Student Directory</button>
            </a>
        </div>
        
    </div>

</body>
</html>
